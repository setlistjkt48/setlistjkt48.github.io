  <style>
    /* --- Tambah font custom --- */
    @font-face {
      font-family: 'font-bold';
      src: url('assets/fonts/font-bold.otf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'font-medium';
      src: url('assets/fonts/font-medium.otf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'font-light';
      src: url('assets/fonts/font-light.otf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* --- Global Style --- */
    :root {
      --gradient: linear-gradient(135deg, #ec4899, #8b5cf6);
      --bg-dark: #2b214d;
      --card-bg: rgba(255,255,255,0.05);
      --text: #ffe4f3;
      --muted: #d1a3c4;
      --btn-bg: #ec4899;
      --btn-bg-hover: #db2777;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Poppins", Sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.5;
    }

    /* --- Header Section --- */
    body {
      margin: 0;
      padding: 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: left;
      padding: 20px;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin-right: 20px;
      border-radius: 12px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-text h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .header-text h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: normal;
    }

    .header-text p {
      margin: 5px 0 0;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    /* --- Social Media --- */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px; /* jarak antar tombol */
      padding: 10px;
    }

    .button-group a {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 90px;
      height: 40px;
      font-size: 14px;
      text-decoration: none;
      background-color: var(--btn-bg-hover);
      color: #ffdfff;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .button-group a:hover {
      background-color: deeppink;
    }

    /* --- Gallery / Photo Frames --- */
    .container {
      max-width: 720px;
      width: 90%;
      margin: 4rem auto;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 mendatar secara horizontal */
      gap: 2rem;
      align-items: start;
    }

    .photo-card {
      background: transparent;
      cursor: pointer;
    }

    /* Frame with 16:9 ratio, rounded corners and elegant overlay title */
    .photo-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9; /* modern way to keep 16:9 */
      border-radius: 18px; /* border radius 8px */
      overflow: hidden;
      box-shadow: var(--frame-shadow);
      background-size: cover;
      background-position: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .photo-frame:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 18px 50px rgba(11,7,30,0.7);
    }

    /* Elegant bottom band for title inside frame */
    .photo-title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.45) 40%, rgba(0,0,0,0.7) 100%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-align: center;
      box-sizing: border-box;
    }

    /* small subtitle below title (inside frame) */
    .photo-subtitle {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 1px;
      opacity: 0.95;
      margin-top: 0rem;
    }

    /* Responsive: 1 column on small screens */
    @media (max-width: 720px) {
      .photo-grid {
        grid-template-columns: 1fr;
      }
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      letter-spacing: 0.5px;
      padding: 2.5rem 1rem;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
