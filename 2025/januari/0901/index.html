<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setlist JKT48</title>
  <link rel="icon" type="image/x-icon" href="../../../assets/img/favicon.ico">
  <style>
    /* --- Global Style --- */
    :root {
      --gradient: linear-gradient(135deg, #ec4899, #8b5cf6);
      --bg-dark: #2b214d;
      --card-bg: rgba(255,255,255,0.05);
      --text: #ffe4f3;
      --muted: #d1a3c4;
      --btn-bg: #ec4899;
      --btn-bg-hover: #db2777;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Poppins", Sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.5;
    }

    /* --- Header Section --- */
    body {
      margin: 0;
      padding: 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: left;
      padding: 20px;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin-right: 20px;
      border-radius: 12px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-text h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .header-text h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: normal;
    }

    .header-text p {
      margin: 5px 0 0;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    /* --- Social Media --- */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px; /* jarak antar tombol */
      padding: 10px;
    }

    .button-group a {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 90px;
      height: 40px;
      font-size: 14px;
      text-decoration: none;
      background-color: var(--btn-bg-hover);
      color: #ffdfff;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .button-group a:hover {
      background-color: deeppink;
    }

    /* --- Main Content --- */
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      gap: 20px; /* jarak antar header dan player */
    }

    .header-bar {
      position: relative;
      width: 100%;
      max-width: 1080px;
      height: 60px;
      margin-bottom: 0px; /* jarak dengan video */
      background: linear-gradient(135deg,#333963,#56275f,#a83971);
      border-radius: 10px;
      display: flex;
      justify-content: space-between; /* kiri - kanan */
      align-items: center;
      padding: 10px 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,.4);
    }

    .header-bar h1 {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      margin: 0;
    }

    .header-bar .back-btn {
      background: #ec4899;
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background .2s;
    }

    .header-bar .back-btn:hover {
      background: #d93582;
    }
    .player-container {
      position: relative;
      width: 100%;
      max-width: 1080px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,.6);
      user-select: none;   /* tidak bisa seleksi teks */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      cursor: default;     /* ubah kursor jadi panah biasa */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      pointer-events: none;
    }
    #player-container iframe,
    #player-container video {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      cursor: default;     /* hilangkan kursor teks dalam video */
    }

    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;   /* atur vertikal: progress di atas, tombol di bawah */
      gap: 6px; padding: 8px 12px;
      background: rgba(0,0,0,.6);
      transition: opacity .3s;
    }
    .controls.hide { opacity: 0; pointer-events: none; }
    .btn {
      position: relative;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      transition: background .2s;
    }
    .btn:hover { background: rgba(255,255,255,.15); }
    .btn svg { width: 22px; height: 22px; fill: #fff; }
    .btn[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.8); color: #fff;
      padding: 4px 6px; border-radius: 4px; font-size: 12px;
      white-space: nowrap;
    }
    .time { color: #fff; font-size: 13px; min-width: 120px; text-align: center; }
    .progress-wrap {
      width: 100%;
      position: relative; height: 6px; cursor: pointer;
    }
    .controls-bar {
      display: flex;          /* tombol-tombol mendatar */
      align-items: center;
      justify-content: space-between; /* opsional: bagi rata tombol */
    }
    .controls-left,
    .controls-right {
      display: flex;
      align-items: center;
     gap: 10px; /* jarak antar tombol */
    }
    .progress-bg, .progress-buffered, .progress-played {
      position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px;
    }
    .progress-bg { width: 100%; background: #444; }
    .progress-buffered { background: #888; width: 0%; }
    .progress-played { background: #ec4899; width: 0%; }
    .progress-thumb {
      position: absolute; top: 50%; transform: translate(-50%,-50%);
      width: 14px; height: 14px; background: #ec4899; border-radius: 50%;
    }
    .preview {
      position: absolute;
      bottom: 120%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      background: #000;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 6px;
      overflow: hidden;
      width: 160px;
    }
    .preview img { width: 100%; height: auto; display: block; }
    .preview-time { font-size: 12px; color: #fff; padding: 2px 4px; }
    .volume-container {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .volume-slider {
      width: 80px;
      appearance: none;          /* ✅ standard property */
      -webkit-appearance: none;  /* ✅ Chrome, Safari */
      -moz-appearance: none;     /* ✅ Firefox */
      height: 6px; border-radius: 6px; 
      background: linear-gradient(to right, #ec4899 100%, #666 0%);
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #ec4899;
    }
    .settings-menu {
      position: absolute; bottom: 40px; right: 0;
      background: rgba(30,30,30,.95);
      border-radius: 8px; display: none; min-width: 100px;
    }
    .settings-menu.active { display: block; }
    .settings-menu button {
      display: block; width: 100%; background: none; border: none;
      color: #fff; text-align: left; padding: 6px 10px; cursor: pointer;
    }
    .settings-menu button.active,
    .settings-menu button:hover { background: rgba(255,255,255,.1); }
    @keyframes spin { 100% { transform: translate(-50%,-50%) rotate(360deg); } }

    /* --- Footer --- */
    footer {
      text-align: center;
      padding: 2.5rem 1rem;
      font-size: 0.9rem;
      font-weight: bold;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <!-- Hero -->
  <header class="header">
    <img src="../../../assets/img/logosetlistjkt48.png" alt="Logo" class="logo">
    <div class="header-text">
      <h1>Arsip</h1>
      <h2>Theater JKT48</h2>
      <p>by: SetlistJKT48</p>
    </div>
  </header>

  <div class="button-group">
    <a href="https://youtube.com/@SetlistJKT48" target="_blank">Youtube</a>
    <a href="https://saweria.co/setlistjkt48" target="_blank">Saweria</a>
    <a href="https://whatsapp.com/channel/0029Vb65ZH56xCSTIchNky0u" target="_blank">WhatsApp</a>
  </div>

  <!-- Main Content -->
  <div class="wrapper">
    <!-- Header di atas player -->
    <div class="header-bar">
      <h1>Now Playing 🎬</h1>
      <button class="back-btn" onclick="window.close()">Kembali</button>
    </div>
    <!-- Video Player -->
    <div class="player-container" id="player-container">
    <div id="video"></div>
    <div class="controls" id="controls">
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bg"></div>
        <div class="progress-buffered" id="buffered"></div>
        <div class="progress-played" id="played"></div>
        <div class="progress-thumb" id="thumb"></div>
        <div class="preview" id="preview">
          <img id="preview-img" src="" alt="preview">
          <div class="preview-time" id="preview-time">00:00:00</div>
        </div>
      </div>
      <div class="controls-bar">
        <div class="controls-left">
          <button id="play" class="btn" data-tooltip="Play/Pause"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          <button id="rewind" class="btn" data-tooltip="Rewind 10s"><svg viewBox="0 0 24 24"><path d="M12 12L21 5v14l-9-7zm-1 7V5L2 12l9 7z"/></svg></button>
          <button id="forward" class="btn" data-tooltip="Forward 10s"><svg viewBox="0 0 24 24"><path d="M12 12L3 5v14l9-7zm1-7v14l9-7-9-7z"/></svg></button>
          <div class="time" id="time">00:00:00 / 00:00:00</div>
        </div>
      
        <div class="controls-right">
        <div class="volume-container">
          <button id="volume-btn" class="btn"><img id="volume-icon" src="../../../assets/svg/volume.svg" alt="volume" width="22" height="22"></button>
          <input type="range" id="volume" class="volume-slider" min="0" max="100" value="100">
        </div>
        <div style="position:relative;">
          <button id="settings-btn" class="btn" data-tooltip="Quality"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.04-1.59a.5.5 0 0 0 .12-.65l-1.93-3.34a.5.5 0 0 0-.62-.22l-2.4.96c-.5-.39-1.04-.7-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.8a.5.5 0 0 0-.5.42l-.36 2.54c-.58.24-1.12.55-1.62.94l-2.4-.96a.5.5 0 0 0-.62.22L2.68 8.06a.5.5 0 0 0 .12.65L4.84 10.3c-.05.3-.07.61-.07.94s.02.64.07.94L2.8 13.78a.5.5 0 0 0-.12.65l1.93 3.34c.15.27.48.36.76.22l2.4-.96c.5.39 1.04.7 1.62.94l.36 2.54c.04.24.24.42.5.42h3.8c.26 0 .46-.18.5-.42l.36-2.54c.58-.24 1.12-.55 1.62-.94l2.4.96c.28.14.61.05.76-.22l1.93-3.34a.5.5 0 0 0-.12-.65l-2.04-1.59zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg></button>
          <div class="settings-menu" id="settings-menu"></div>
        </div>
        <button id="fullscreen" class="btn" data-tooltip="Fullscreen"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm12 3h-3v2h5v-5h-2v3zM7 7h3V5H5v5h2V7zm10-2v2h3v3h2V5h-5z"/></svg></button>
        </div>
      </div>
    </div>

  <script>
    const params = new URLSearchParams(location.search);
    const videoId = "QrCBrhvfsy4";
    let player, raf, hideTimer; lastVolume = 100;

    const container = document.getElementById("player-container");
    const controls = document.getElementById("controls");
    const playBtn = document.getElementById("play");
    const rewindBtn = document.getElementById("rewind");
    const forwardBtn = document.getElementById("forward");
    const progressWrap = document.getElementById("progress-wrap");
    const played = document.getElementById("played");
    const buffered = document.getElementById("buffered");
    const thumb = document.getElementById("thumb");
    const timeEl = document.getElementById("time");
    const volumeBtn = document.getElementById("volume-btn");
    const volumeIcon = document.getElementById("volume-icon");
    const volumeSlider = document.getElementById("volume");
    const settingsBtn = document.getElementById("settings-btn");
    const settingsMenu = document.getElementById("settings-menu");
    const fullscreenBtn = document.getElementById("fullscreen");
    const preview = document.getElementById("preview");
    const previewImg = document.getElementById("preview-img");
    const previewTime = document.getElementById("preview-time");

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("video", {
        videoId: videoId,
        playerVars: { controls:0, disablekb:1, modestbranding:1, rel:0 },
        events: { onReady: onReady, onStateChange:onStateChange }
      });
    }
    function onReady() {
      function togglePlay(){
        if(player.getPlayerState()===YT.PlayerState.PLAYING){
          player.pauseVideo();
          playBtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        }else{
          player.playVideo();
          playBtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
        }
      }
      playBtn.onclick=togglePlay;
      container.onclick=(e)=>{ if(!e.target.closest(".controls")) togglePlay(); };
      container.ondblclick=()=>{ if(!document.fullscreenElement)container.requestFullscreen();else document.exitFullscreen(); };
      document.addEventListener("keydown",e=>{
        if(e.code==="Space"){e.preventDefault();togglePlay();}
        if(e.code==="ArrowRight"){e.preventDefault();player.seekTo(player.getCurrentTime()+10,true);}
        if(e.code==="ArrowLeft"){e.preventDefault();player.seekTo(player.getCurrentTime()-10,true);}
        if (e.key.toLowerCase() === "f") {e.preventDefault();
        if (!document.fullscreenElement) {container.requestFullscreen();} else {document.exitFullscreen();}}
      });

      rewindBtn.onclick=()=>player.seekTo(player.getCurrentTime()-10,true);
      forwardBtn.onclick=()=>player.seekTo(player.getCurrentTime()+10,true);

      function updateVolumeSlider(){
        const val = volumeSlider.value;
        volumeSlider.style.background = `linear-gradient(to right, #ec4899 ${val}%, #666 ${val}%)`;
      }

      volumeSlider.oninput=()=>{
        player.setVolume(volumeSlider.value);
        updateVolumeSlider();
        if(volumeSlider.value==0){
          volumeIcon.src = "../../../assets/svg/volume-mute.svg";
        }else{
          volumeIcon.src = "../../../assets/svg/volume.svg";
        }
        lastVolume=volumeSlider.value;
      };

      volumeBtn.onclick=()=>{
        if(player.isMuted() || volumeSlider.value==0){
          player.unMute();
          player.setVolume(lastVolume||100);
          volumeSlider.value=lastVolume||100;
          updateVolumeSlider();
          volumeIcon.src = "../../../assets/svg/volume.svg";
        }else{
          player.mute();
          volumeSlider.value=0;
          updateVolumeSlider();
          volumeIcon.src = "../../../assets/svg/volume-mute.svg";
        }
      };

      const QUALITY_MAP={'Auto':'default','144p':'small','360p':'medium','480p':'large','720p':'hd720','1080p':'hd1080'};
      settingsBtn.onclick=()=>{
        settingsMenu.innerHTML="";
        Object.keys(QUALITY_MAP).forEach(label=>{
          const btn=document.createElement("button");
          btn.textContent=label;
          btn.onclick=()=>{player.setPlaybackQuality(QUALITY_MAP[label]);settingsMenu.classList.remove("active");};
          settingsMenu.appendChild(btn);
        });
        settingsMenu.classList.toggle("active");
      };

      fullscreenBtn.onclick=()=>{if(!document.fullscreenElement)container.requestFullscreen();else document.exitFullscreen();};

      function update(){
        const dur=player.getDuration(), cur=player.getCurrentTime();
        if(dur){
          played.style.width=(cur/dur*100)+"%";
          thumb.style.left=(cur/dur*100)+"%";
          timeEl.textContent=formatTime(cur)+" / "+formatTime(dur);
        }
        buffered.style.width=(player.getVideoLoadedFraction()*100)+"%";
        raf=requestAnimationFrame(update);
      }
      update();

      function seek(e){
        const rect=progressWrap.getBoundingClientRect();
        const pct=(e.clientX-rect.left)/rect.width;
        player.seekTo(player.getDuration()*pct,true);
      }
      progressWrap.addEventListener("click",seek);

      progressWrap.addEventListener("mousemove",(e)=>{
        const rect=progressWrap.getBoundingClientRect();
        const pct=(e.clientX-rect.left)/rect.width;
        const t=player.getDuration()*pct;
        preview.style.display="flex";
        preview.style.left=(pct*100)+"%";
        previewImg.src=`https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
        previewTime.textContent=formatTime(t);
      });
      progressWrap.addEventListener("mouseleave",()=>{ preview.style.display="none"; });
    }

    function onStateChange(e){
      if(e.data===YT.PlayerState.BUFFERING) spinner.style.display="block";
      else spinner.style.display="none";
    }

    function formatTime(sec){
      sec=Math.floor(sec);
      const h=Math.floor(sec/3600);
      const m=Math.floor((sec%3600)/60);
      const s=sec%60;
      return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    }

    window.onYouTubeIframeAPIReady=onYouTubeIframeAPIReady;

    // === Auto-hide controls (fullscreen & normal) ===
    let hideControlsTimer;

    function showControls() {
      controls.classList.remove("hide");
      if (hideControlsTimer) clearTimeout(hideControlsTimer);

      hideControlsTimer = setTimeout(() => {
        controls.classList.add("hide");
      }, 2000); // 2 detik
    }

    // Tampilkan controls saat ada interaksi
    container.addEventListener("mousemove", showControls);
    container.addEventListener("click", showControls);

    // Saat masuk/keluar fullscreen tetap reset logika
    document.addEventListener("fullscreenchange", () => {
      controls.classList.remove("hide");
      if (hideControlsTimer) clearTimeout(hideControlsTimer);
      showControls();
    });

    // Inisialisasi saat halaman load
    window.addEventListener("load", showControls);  
  </script>
  </div>

  <footer>
    <p>© 2025 SetlistJKT48. Dibuat dengan 💖 dan penuh semangat.</p>
  </footer>

  <script>
    const playerContainer = document.getElementById("player-container");

  // 🔹 Kalau double-click di controls, hentikan event biar tidak tembus
  controls.addEventListener("dblclick", function (e) {
    e.preventDefault();
    e.stopImmediatePropagation(); // lebih kuat daripada stopPropagation
  });

  // 🔹 Double-click di video area → fullscreen toggle
  playerContainer.addEventListener("dblclick", function (e) {
    if (!document.fullscreenElement) {
      playerContainer.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });
  </script>
</body>
</html>
